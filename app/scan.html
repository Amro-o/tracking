<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>مسح رمز الحضور</title>
<link rel="stylesheet" href="/styles.css" />
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  html,body{height:100%}
  body{
    margin:0; background:#0b0f19; color:#fff; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; padding:20px;
  }
  .sc-title{font-size:17px; font-weight:800; margin-bottom:4px}
  .sc-sub{font-size:13px; color:#9CA3AF; margin-bottom:18px; text-align:center; max-width:340px}
  #reader{
    width:min(88vw,340px); border-radius:18px; overflow:hidden;
    box-shadow:0 0 0 3px rgba(255,255,255,.15);
  }
  #reader video{ border-radius:18px }
  #reader img{ display:none }
  .sc-status{ margin-top:18px; font-size:13px; color:#9CA3AF; min-height:20px; text-align:center }
  .sc-status.ok{ color:#4ADE80; font-weight:700 }
  .sc-status.err{ color:#F87171; font-weight:700 }
  .sc-manual{ margin-top:22px; font-size:12px; color:#6B7280; text-align:center; max-width:320px }
  .sc-manual a{ color:#93C5FD }
  #reader__dashboard_section_csr button{
    background:var(--accent,#B45309); color:#fff; border:none; border-radius:8px;
    padding:9px 16px; font-size:13px; cursor:pointer; margin-top:10px;
  }
  #reader__status_span{ color:#9CA3AF !important }
</style>
</head>
<body>
  <div class="sc-title">امسح رمز الحضور</div>
  <div class="sc-sub">وجّه كاميرا الجهاز نحو رمز QR المعروض عند مدخل المدرسة</div>

  <div id="reader"></div>

  <div class="sc-status" id="scStatus">جارٍ تشغيل الكاميرا…</div>
  <div class="sc-manual">لا تعمل الكاميرا؟ تأكد من السماح للمتصفح بالوصول إليها (يتطلب اتصال HTTPS)، أو اطلب الرابط مباشرة من الإدارة.</div>

<script>
const status = document.getElementById("scStatus");
let redirected = false;
let stream;

function handleResult(decodedText) {
    if (redirected) return;

    try {
        const url = new URL(decodedText, location.origin);

        if (url.origin === location.origin) {
            redirected = true;

            status.className = "sc-status ok";
            status.textContent = "تم العثور على الرمز، جارٍ التحويل…";

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            location.href = url.href;
            return;
        }
    } catch {}

    status.className = "sc-status err";
    status.textContent = "الرمز غير صالح.";
}

async function startNativeScanner() {

    stream = await navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        }
    });

    const video = document.createElement("video");
    video.setAttribute("playsinline", true);
    video.autoplay = true;
    video.srcObject = stream;

    document.getElementById("reader").appendChild(video);

    await video.play();

    const track = stream.getVideoTracks()[0];

    try {
        await track.applyConstraints({
            advanced: [
                { focusMode: "continuous" }
            ]
        });
    } catch {}

    const detector = new BarcodeDetector({
        formats: ["qr_code"]
    });

    status.textContent = "وجّه الكاميرا نحو الرمز…";

    async function scan() {

        if (redirected) return;

        try {
            const codes = await detector.detect(video);

            if (codes.length) {
                handleResult(codes[0].rawValue);
                return;
            }
        } catch {}

        requestAnimationFrame(scan);
    }

    scan();
}

async function startFallback() {

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        },
        {
            fps: 30,
            disableFlip: true,
            qrbox: (w, h) => {
                const s = Math.min(w, h) * 0.9;
                return {
                    width: s,
                    height: s
                };
            }
        },
        text => {
            html5QrCode.stop().catch(()=>{});
            handleResult(text);
        }
    ).then(() => {

        status.textContent = "وجّه الكاميرا نحو الرمز…";

        const track = html5QrCode.getRunningTrack?.();

        if (track) {
            track.applyConstraints({
                advanced: [
                    { focusMode: "continuous" }
                ]
            }).catch(()=>{});
        }

    }).catch(err => {

        console.error(err);

        status.className = "sc-status err";
        status.textContent = "تعذر تشغيل الكاميرا.";

    });

}

(async () => {

    if ("BarcodeDetector" in window) {

        try {
            await startNativeScanner();
            return;
        } catch (e) {
            console.log("Native scanner failed, using fallback.");
        }

    }

    if (typeof Html5Qrcode !== "undefined") {
        startFallback();
        return;
    }

    status.className = "sc-status err";
    status.textContent = "تعذر تحميل مكتبة المسح.";

})();
</script>
</body>
</html>
