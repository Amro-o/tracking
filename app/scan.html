<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>مسح رمز الحضور</title>
<link rel="stylesheet" href="/styles.css" />
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  html,body{height:100%}
  body{
    margin:0; background:#0b0f19; color:#fff; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; padding:20px;
  }
  .sc-title{font-size:17px; font-weight:800; margin-bottom:4px}
  .sc-sub{font-size:13px; color:#9CA3AF; margin-bottom:18px; text-align:center; max-width:340px}
  #reader{
    width:min(88vw,340px); border-radius:18px; overflow:hidden;
    box-shadow:0 0 0 3px rgba(255,255,255,.15);
  }
  #reader video{ border-radius:18px }
  #reader img{ display:none }
  .sc-status{ margin-top:18px; font-size:13px; color:#9CA3AF; min-height:20px; text-align:center }
  .sc-status.ok{ color:#4ADE80; font-weight:700 }
  .sc-status.err{ color:#F87171; font-weight:700 }
  .sc-manual{ margin-top:22px; font-size:12px; color:#6B7280; text-align:center; max-width:320px }
  .sc-manual a{ color:#93C5FD }
  #reader__dashboard_section_csr button{
    background:var(--accent,#B45309); color:#fff; border:none; border-radius:8px;
    padding:9px 16px; font-size:13px; cursor:pointer; margin-top:10px;
  }
  #reader__status_span{ color:#9CA3AF !important }
</style>
</head>
<body>
  <div class="sc-title">امسح رمز الحضور</div>
  <div class="sc-sub">وجّه كاميرا الجهاز نحو رمز QR المعروض عند مدخل المدرسة</div>

  <div id="reader"></div>

  <div class="sc-status" id="scStatus">جارٍ تشغيل الكاميرا…</div>
  <div class="sc-manual">لا تعمل الكاميرا؟ تأكد من السماح للمتصفح بالوصول إليها (يتطلب اتصال HTTPS)، أو اطلب الرابط مباشرة من الإدارة.</div>

<script>
  const status = document.getElementById('scStatus');
  let redirected = false;

  function onScanSuccess(decodedText) {
    if (redirected) return;
    try {
      const url = new URL(decodedText, location.origin);
      if (url.origin === location.origin) {
        redirected = true;
        status.className = 'sc-status ok';
        status.textContent = 'تم العثور على الرمز، جارٍ التحويل…';
        html5QrCode.stop().catch(()=>{}).finally(() => { location.href = url.href; });
        return;
      }
    } catch (e) { /* ليس رابطاً صالحاً */ }
    status.className = 'sc-status err';
    status.textContent = 'الرمز الممسوح غير صالح لهذا النظام.';
  }

  function onScanFailure() {
    // تُستدعى في كل إطار لا يحتوي رمزاً — تجاهلها، هذا طبيعي أثناء البحث عن الرمز
  }

  let html5QrCode;
  if (typeof Html5Qrcode === 'undefined') {
    status.className = 'sc-status err';
    status.textContent = 'تعذّر تحميل مكتبة قراءة الرمز (تحقق من اتصال الإنترنت) — أعد تحميل الصفحة.';
  } else {
    html5QrCode = new Html5Qrcode('reader');
    html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      onScanFailure
    ).then(() => {
      status.textContent = 'وجّه الكاميرا نحو الرمز…';
    }).catch(err => {
      status.className = 'sc-status err';
      status.textContent = 'تعذّر الوصول إلى الكاميرا. تأكد من السماح للمتصفح بذلك.';
      console.error('camera start error:', err);
    });
  }
</script>
</body>
</html>
